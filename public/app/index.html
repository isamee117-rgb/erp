
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeanERP Enterprise Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, html, body, button, input, select, textarea { 
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif !important;
      -webkit-font-smoothing: antialiased;
    }
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .nav-link-active {
      background-color: #4f46e5;
      color: white;
      box-shadow: 0 20px 25px -5px rgb(79 70 229 / 0.1), 0 8px 10px -6px rgb(79 70 229 / 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-entry { animation: fadeIn 0.4s ease-out forwards; }
  </style>
  <script type="module" crossorigin src="/app/assets/index-JrqavdBS.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>
</body>
</html>
